<svg width="1100" height="340" viewBox="0 0 1100 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>IntelliMesh</title>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.3">
<stop offset="0%" stop-color="#0a0e17"/>
<stop offset="45%" stop-color="#141c33"/>
<stop offset="100%" stop-color="#20335c"/>
</linearGradient>
<linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#0a0e17" stop-opacity="0"/>
<stop offset="100%" stop-color="#3a5f9e" stop-opacity="0.35"/>
</linearGradient>
</defs>

<rect width="1100" height="340" fill="url(#bg)"/>

<!-- soft bottom wave -->
<path d="M0 300 C 260 260, 640 340, 1100 270 L1100 340 L0 340 Z" fill="#050810" opacity="0.55"/>
<path d="M0 310 C 300 290, 700 300, 1100 250 L1100 340 L0 340 Z" fill="url(#wave)"/>

<!-- subtle mesh nodes on the right -->
<g stroke="#4d6fae" stroke-width="1" opacity="0.35">
<line x1="820" y1="70" x2="900" y2="120"/>
<line x1="900" y1="120" x2="860" y2="200"/>
<line x1="860" y1="200" x2="960" y2="230"/>
<line x1="900" y1="120" x2="1000" y2="90"/>
<line x1="1000" y1="90" x2="1040" y2="180"/>
<line x1="960" y1="230" x2="1040" y2="180"/>
</g>
<g fill="#6fa3e0">
<circle cx="820" cy="70" r="4"/>
<circle cx="900" cy="120" r="5"/>
<circle cx="860" cy="200" r="4"/>
<circle cx="960" cy="230" r="4"/>
<circle cx="1000" cy="90" r="4"/>
<circle cx="1040" cy="180" r="4"/>
</g>

<!-- mesh logo icon -->
<g transform="translate(120,120)">
<g stroke="#7fc4c4" stroke-width="2.5" opacity="0.9">
<line x1="0" y1="30" x2="30" y2="0"/>
<line x1="30" y1="0" x2="60" y2="30"/>
<line x1="0" y1="30" x2="30" y2="60"/>
<line x1="30" y1="60" x2="60" y2="30"/>
<line x1="30" y1="0" x2="30" y2="60"/>
</g>
<g fill="#eaf7f4">
<circle cx="0" cy="30" r="6"/>
<circle cx="30" cy="0" r="6"/>
<circle cx="60" cy="30" r="6"/>
<circle cx="30" cy="60" r="6"/>
<circle cx="30" cy="30" r="7"/>
</g>
</g>

<!-- title block -->
<text x="230" y="175" font-size="66" font-weight="700" fill="#f4f6fb">IntelliMesh</text>
<text x="232" y="215" font-size="23" font-weight="500" fill="#a9bcdd">Air-Gapped Multimodal RAG System</text>
<text x="232" y="248" font-size="15" fill="#6f83ac">Local retrieval &#183; local generation &#183; zero external calls</text>

</svg>
